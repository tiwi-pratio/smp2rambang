openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SIAKAD - Sistem Informasi Akademik SMP Negeri 2 Rambang
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: siswa
    description: Manajemen data siswa
  - name: guru
    description: Manajemen data guru
  - name: kelas
    description: Manajemen kelas
  - name: mata_pelajaran
    description: Manajemen mata pelajaran
  - name: jadwal
    description: Jadwal pelajaran
  - name: absensi
    description: Manajemen absensi
  - name: nilai
    description: Manajemen nilai
  - name: dashboard
    description: Dashboard statistik

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login pengguna
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login berhasil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Email atau password salah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout pengguna
      responses:
        "200":
          description: Logout berhasil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Ambil data pengguna saat ini
      responses:
        "200":
          description: Data pengguna
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Tidak terautentikasi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/accounts:
    get:
      operationId: listAccounts
      tags: [auth]
      summary: Daftar semua akun pengguna (admin only)
      responses:
        "200":
          description: Daftar akun
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountItem"
        "403":
          description: Akses ditolak

  /auth/create-account:
    post:
      operationId: createAccount
      tags: [auth]
      summary: Buat akun login baru (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountBody"
      responses:
        "201":
          description: Akun berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Data tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/bulk-create-accounts:
    post:
      operationId: bulkCreateAccounts
      tags: [auth]
      summary: Buat banyak akun login sekaligus (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateAccountsBody"
      responses:
        "200":
          description: Hasil pembuatan akun massal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkCreateAccountsResponse"

  /auth/delete-account/{supabase_id}:
    delete:
      operationId: deleteAccount
      tags: [auth]
      summary: Hapus akun login (admin only)
      parameters:
        - name: supabase_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Akun berhasil dihapus
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Akun tidak ditemukan

  # DASHBOARD
  /dashboard/admin-stats:
    get:
      operationId: getAdminStats
      tags: [dashboard]
      summary: Statistik untuk admin dashboard
      responses:
        "200":
          description: Statistik admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /dashboard/guru-stats:
    get:
      operationId: getGuruStats
      tags: [dashboard]
      summary: Statistik untuk guru dashboard
      responses:
        "200":
          description: Statistik guru
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuruStats"

  /dashboard/siswa-stats:
    get:
      operationId: getSiswaStats
      tags: [dashboard]
      summary: Statistik untuk siswa dashboard
      responses:
        "200":
          description: Statistik siswa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiswaStats"

  # SISWA
  /siswa:
    get:
      operationId: listSiswa
      tags: [siswa]
      summary: Daftar semua siswa
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: kelas_id
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Daftar siswa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiswaListResponse"
    post:
      operationId: createSiswa
      tags: [siswa]
      summary: Tambah siswa baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSiswaBody"
      responses:
        "201":
          description: Siswa berhasil ditambahkan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Siswa"

  /siswa/{id}:
    get:
      operationId: getSiswa
      tags: [siswa]
      summary: Detail siswa
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Data siswa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Siswa"
    put:
      operationId: updateSiswa
      tags: [siswa]
      summary: Update data siswa
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSiswaBody"
      responses:
        "200":
          description: Data siswa diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Siswa"
    delete:
      operationId: deleteSiswa
      tags: [siswa]
      summary: Hapus siswa
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Siswa berhasil dihapus
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # GURU
  /guru:
    get:
      operationId: listGuru
      tags: [guru]
      summary: Daftar semua guru
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Daftar guru
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Guru"
    post:
      operationId: createGuru
      tags: [guru]
      summary: Tambah guru baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGuruBody"
      responses:
        "201":
          description: Guru berhasil ditambahkan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guru"

  /guru/{id}:
    get:
      operationId: getGuru
      tags: [guru]
      summary: Detail guru
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Data guru
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guru"
    put:
      operationId: updateGuru
      tags: [guru]
      summary: Update data guru
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGuruBody"
      responses:
        "200":
          description: Data guru diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guru"
    delete:
      operationId: deleteGuru
      tags: [guru]
      summary: Hapus guru
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Guru berhasil dihapus
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # KELAS
  /kelas:
    get:
      operationId: listKelas
      tags: [kelas]
      summary: Daftar semua kelas
      responses:
        "200":
          description: Daftar kelas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Kelas"
    post:
      operationId: createKelas
      tags: [kelas]
      summary: Tambah kelas baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKelasBody"
      responses:
        "201":
          description: Kelas berhasil ditambahkan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kelas"

  /kelas/{id}:
    put:
      operationId: updateKelas
      tags: [kelas]
      summary: Update kelas
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKelasBody"
      responses:
        "200":
          description: Kelas diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kelas"
    delete:
      operationId: deleteKelas
      tags: [kelas]
      summary: Hapus kelas
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Kelas berhasil dihapus
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # MATA PELAJARAN
  /mata-pelajaran:
    get:
      operationId: listMataPelajaran
      tags: [mata_pelajaran]
      summary: Daftar semua mata pelajaran
      responses:
        "200":
          description: Daftar mata pelajaran
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MataPelajaran"
    post:
      operationId: createMataPelajaran
      tags: [mata_pelajaran]
      summary: Tambah mata pelajaran baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMataPelajaranBody"
      responses:
        "201":
          description: Mata pelajaran berhasil ditambahkan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MataPelajaran"

  /mata-pelajaran/{id}:
    put:
      operationId: updateMataPelajaran
      tags: [mata_pelajaran]
      summary: Update mata pelajaran
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMataPelajaranBody"
      responses:
        "200":
          description: Mata pelajaran diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MataPelajaran"
    delete:
      operationId: deleteMataPelajaran
      tags: [mata_pelajaran]
      summary: Hapus mata pelajaran
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Mata pelajaran berhasil dihapus
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # JADWAL
  /jadwal:
    get:
      operationId: listJadwal
      tags: [jadwal]
      summary: Daftar jadwal pelajaran
      parameters:
        - name: kelas_id
          in: query
          schema:
            type: string
        - name: guru_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Daftar jadwal
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Jadwal"
    post:
      operationId: createJadwal
      tags: [jadwal]
      summary: Tambah jadwal baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJadwalBody"
      responses:
        "201":
          description: Jadwal berhasil ditambahkan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Jadwal"

  /jadwal/{id}:
    delete:
      operationId: deleteJadwal
      tags: [jadwal]
      summary: Hapus jadwal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Jadwal berhasil dihapus
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ABSENSI
  /absensi:
    get:
      operationId: listAbsensi
      tags: [absensi]
      summary: Daftar absensi
      parameters:
        - name: siswa_id
          in: query
          schema:
            type: string
        - name: kelas_id
          in: query
          schema:
            type: string
        - name: mata_pelajaran_id
          in: query
          schema:
            type: string
        - name: tanggal
          in: query
          schema:
            type: string
        - name: bulan
          in: query
          schema:
            type: string
            description: Format YYYY-MM
      responses:
        "200":
          description: Daftar absensi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Absensi"
    post:
      operationId: createAbsensi
      tags: [absensi]
      summary: Input absensi (bisa bulk)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAbsensiBody"
      responses:
        "201":
          description: Absensi berhasil disimpan
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Absensi"

  /absensi/rekap:
    get:
      operationId: getRekapAbsensi
      tags: [absensi]
      summary: Rekap absensi per siswa per bulan
      parameters:
        - name: siswa_id
          in: query
          schema:
            type: string
        - name: bulan
          in: query
          schema:
            type: string
            description: Format YYYY-MM
        - name: kelas_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Rekap absensi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RekapAbsensi"

  /absensi/{id}:
    put:
      operationId: updateAbsensi
      tags: [absensi]
      summary: Update status absensi
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAbsensiBody"
      responses:
        "200":
          description: Absensi diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Absensi"

  # NILAI
  /nilai:
    get:
      operationId: listNilai
      tags: [nilai]
      summary: Daftar nilai siswa
      parameters:
        - name: siswa_id
          in: query
          schema:
            type: string
        - name: mata_pelajaran_id
          in: query
          schema:
            type: string
        - name: semester
          in: query
          schema:
            type: string
        - name: tahun_ajaran
          in: query
          schema:
            type: string
        - name: kelas_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Daftar nilai
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Nilai"
    post:
      operationId: createNilai
      tags: [nilai]
      summary: Input nilai siswa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNilaiBody"
      responses:
        "201":
          description: Nilai berhasil disimpan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Nilai"

  /nilai/{id}:
    put:
      operationId: updateNilai
      tags: [nilai]
      summary: Update nilai siswa
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNilaiBody"
      responses:
        "200":
          description: Nilai diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Nilai"
    delete:
      operationId: deleteNilai
      tags: [nilai]
      summary: Hapus nilai
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Nilai berhasil dihapus
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /nilai/raport:
    get:
      operationId: getRaport
      tags: [nilai]
      summary: Raport digital siswa
      parameters:
        - name: siswa_id
          in: query
          required: true
          schema:
            type: string
        - name: semester
          in: query
          required: true
          schema:
            type: string
        - name: tahun_ajaran
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Data raport siswa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Raport"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    CreateAccountBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        full_name:
          type: string
        role:
          type: string
          enum: [guru, siswa]
        kelas_id:
          type: string
          description: Wajib jika role=siswa
        nis:
          type: string
          description: NIS siswa (opsional)
        nip:
          type: string
          description: NIP guru (opsional, jika role=guru)
      required:
        - email
        - password
        - full_name
        - role

    BulkCreateAccountsBody:
      type: object
      properties:
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/CreateAccountBody"
          minItems: 1
      required:
        - accounts

    BulkCreateAccountsResponse:
      type: object
      properties:
        created:
          type: integer
        failed:
          type: array
          items:
            type: object
            properties:
              email:
                type: string
              reason:
                type: string
            required:
              - email
              - reason
      required:
        - created
        - failed

    AccountItem:
      type: object
      properties:
        supabase_id:
          type: string
        email:
          type: string
        full_name:
          type: string
        role:
          type: string
          enum: [admin, guru, siswa]
        created_at:
          type: string
        kelas_nama:
          type: string
        siswa_id:
          type: string
        guru_id:
          type: string
      required:
        - supabase_id
        - email
        - full_name
        - role

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
        access_token:
          type: string
        refresh_token:
          type: string
      required:
        - user
        - access_token

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, guru, siswa]
        full_name:
          type: string
        created_at:
          type: string
      required:
        - id
        - email
        - role
        - full_name

    AdminStats:
      type: object
      properties:
        total_siswa:
          type: integer
        total_guru:
          type: integer
        total_kelas:
          type: integer
        total_mata_pelajaran:
          type: integer
        absensi_hari_ini:
          type: integer
        siswa_per_kelas:
          type: array
          items:
            type: object
            properties:
              nama_kelas:
                type: string
              jumlah:
                type: integer
            required:
              - nama_kelas
              - jumlah
      required:
        - total_siswa
        - total_guru
        - total_kelas
        - total_mata_pelajaran
        - absensi_hari_ini
        - siswa_per_kelas

    GuruStats:
      type: object
      properties:
        total_kelas_diajar:
          type: integer
        total_siswa_diajar:
          type: integer
        jadwal_hari_ini:
          type: array
          items:
            $ref: "#/components/schemas/Jadwal"
        mata_pelajaran:
          type: array
          items:
            $ref: "#/components/schemas/MataPelajaran"
      required:
        - total_kelas_diajar
        - total_siswa_diajar
        - jadwal_hari_ini
        - mata_pelajaran

    SiswaStats:
      type: object
      properties:
        nama_siswa:
          type: string
        kelas:
          type: string
        jadwal_hari_ini:
          type: array
          items:
            $ref: "#/components/schemas/Jadwal"
        nilai_terbaru:
          type: array
          items:
            $ref: "#/components/schemas/Nilai"
        rekap_absensi_bulan_ini:
