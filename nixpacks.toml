[phases.setup]
nixPkgs = ["nodejs_22", "nodePackages_latest.pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/siakad run build && NODE_ENV=production pnpm --filter @workspace/api-server run build"]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
